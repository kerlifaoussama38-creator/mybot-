<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ معركة الطاقة</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  text-align: center;
  font-family: Arial;
}

/* ساحة اللعب */
.game {
  position: relative;
  height: 60vh;
}

/* الشخصيات */
.player, .enemy {
  position: absolute;
  bottom: 0;
  width: 120px;
}

.player {
  left: 20px;
}

.enemy {
  right: 20px;
}

/* شريط الحياة */
.bar {
  width: 90%;
  height: 20px;
  background: #333;
  margin: 10px auto;
  border-radius: 10px;
}

.fill {
  height: 100%;
  background: lime;
}

/* الأزرار */
button {
  padding: 12px 20px;
  margin: 5px;
  border: none;
  border-radius: 10px;
  background: orange;
  color: black;
  font-size: 16px;
}

/* تأثير الضربة */
.hit {
  transform: translateX(-20px);
}
</style>
</head>

<body>

<h2>⚡ معركة الطاقة</h2>

<div>حياتك</div>
<div class="bar"><div id="playerHP" class="fill"></div></div>

<div>العدو</div>
<div class="bar"><div id="enemyHP" class="fill"></div></div>

<!-- ساحة اللعب -->
<div class="game">

  <!-- شخصيات (مربعات بدل صور لضمان الظهور) -->
  <div class="player" style="background:red; height:120px;"></div>
  <div class="enemy" style="background:blue; height:120px;"></div>

</div>

<!-- أزرار -->
<div>
  <button onclick="attack()">👊 هجوم</button>
  <button onclick="charge()">⚡ شحن</button>
</div>

<script>
let playerHP = 100;
let enemyHP = 100;
let energy = 0;

function update() {
  document.getElementById("playerHP").style.width = playerHP + "%";
  document.getElementById("enemyHP").style.width = enemyHP + "%";
}

function attack() {
  enemyHP -= 10;

  let enemy = document.querySelector(".enemy");
  enemy.classList.add("hit");

  setTimeout(() => enemy.classList.remove("hit"), 200);

  update();
}

function charge() {
  energy++;
}

/* العدو يهاجم */
setInterval(() => {
  playerHP -= 5;

  let player = document.querySelector(".player");
  player.classList.add("hit");

  setTimeout(() => player.classList.remove("hit"), 200);

  update();
}, 1500);

update();
</script>

</body>
</html>
