<!DOCTYPE html>
<html>
<head>
<style>
body {
  background: black;
  color: white;
  text-align: center;
}

button {
  padding: 15px;
  margin: 10px;
  background: orange;
  border: none;
  border-radius: 10px;
}

.bar {
  height: 20px;
  background: green;
}
</style>
</head>

<body>

<h1>⚡ معركة الطاقة</h1>

<h3>حياتك</h3>
<div class="bar" id="playerHP"></div>

<h3>العدو</h3>
<div class="bar" id="enemyHP"></div>

<br>

<button onclick="attack()">👊 هجوم</button>
<button onclick="charge()">⚡ شحن طاقة</button>

<script>
let playerHP = 100;
let enemyHP = 100;
let energy = 0;

function update() {
  document.getElementById("playerHP").style.width = playerHP + "%";
  document.getElementById("enemyHP").style.width = enemyHP + "%";
}

function attack() {
  if (energy >= 5) {
    enemyHP -= 10;
    energy -= 5;
  }
  update();
}

function charge() {
  energy += 1;
}

update();
</script>

</body>
</html>
