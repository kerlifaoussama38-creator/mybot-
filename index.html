<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>لعبة الربح</title>

<style>
body {
  background: radial-gradient(circle, #1a1a1a, #000);
  color: white;
  text-align: center;
  font-family: Arial;
}

h1 {
  font-size: 30px;
}

#money {
  font-size: 40px;
  margin: 20px;
}

button {
  padding: 20px 40px;
  font-size: 20px;
  border: none;
  border-radius: 15px;
  background: #00c853;
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

button:active {
  transform: scale(0.9);
}

.plus {
  position: absolute;
  color: yellow;
  font-size: 20px;
  animation: float 1s forwards;
}

@keyframes float {
  0% {opacity: 1; transform: translateY(0);}
  100% {opacity: 0; transform: translateY(-50px);}
}
</style>

</head>

<body>

<h1>💰 رصيدك</h1>
<div id="money">0</div>

<button onclick="clickMoney()">اضغط 🐹</button>

<script>
let money = 0;

function clickMoney() {
  money += 10;
  document.getElementById("money").innerText = money;

  let plus = document.createElement("div");
  plus.innerText = "+10";
  plus.className = "plus";

  plus.style.left = (window.innerWidth/2) + "px";
  plus.style.top = "300px";

  document.body.appendChild(plus);

  setTimeout(() => {
    plus.remove();
  }, 1000);
}
</script>

</body>
</html>
