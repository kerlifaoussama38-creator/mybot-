<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ معركة الطاقة</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle, #111 0%, #000 100%);
  color: white;
  text-align: center;
  font-family: Arial;
  overflow: hidden;
}

/* العنوان */
h1 {
  margin-top: 20px;
}

/* شريط الحياة */
.bar {
  width: 80%;
  height: 20px;
  margin: 10px auto;
  background: #333;
  border-radius: 10px;
  overflow: hidden;
}

.fill {
  height: 100%;
  background: lime;
}

/* الشخصيات */
.player, .enemy {
  position: absolute;
  bottom: 120px;
  width: 100px;
  transition: 0.2s;
}

.player { left: 10%; }
.enemy { right: 10%; }

/* الأزرار */
.controls {
  position: absolute;
  bottom: 20px;
  width: 100%;
}

button {
  padding: 15px 25px;
  margin: 10px;
  border: none;
  border-radius: 12px;
  background: #00ff88;
  color: black;
  font-size: 16px;
  box-shadow: 0 0 20px #00ff88;
}

button:active {
  transform: scale(0.9);
}

/* أرقام الضرر */
.damage {
  position: absolute;
  color: red;
  font-size: 24px;
  animation: rise 0.8s forwards;
}

@keyframes rise {
  from { opacity: 1; transform: translateY(0); }
  to { opacity: 0; transform: translateY(-50px); }
}
</style>
</head>

<body>

<h1>⚡ معركة الطاقة</h1>

<!-- حياة -->
<div>حياتك</div>
<div class="bar"><div id="playerHP" class="fill"></div></div>

<div>العدو</div>
<div class="bar"><div id="enemyHP" class="fill"></div></div>

<!-- الشخصيات -->
<img src="https://i.imgur.com/6X12F6R.png" class="player">
<img src="https://i.imgur.com/8Qf6F6S.png" class="enemy">

<!-- أزرار -->
<div class="controls">
  <button onclick="attack()">👊 هجوم</button>
  <button onclick="charge()">⚡ شحن</button>
  <button onclick="special()">💥 ضربة قوية</button>
</div>

<script>
let playerHP = 100;
let enemyHP = 100;
let energy = 0;

function update() {
  document.getElementById("playerHP").style.width = playerHP + "%";
  document.getElementById("enemyHP").style.width = enemyHP + "%";
}

/* إظهار الضرر */
function showDamage(text, x, y) {
  const el = document.createElement("div");
  el.className = "damage";
  el.innerText = text;
  el.style.left = x + "px";
  el.style.top = y + "px";
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 800);
}

/* هجوم عادي */
function attack() {
  enemyHP -= 5;

  document.querySelector(".enemy").style.transform = "translateX(-20px)";
  setTimeout(() => {
    document.querySelector(".enemy").style.transform = "translateX(0)";
  }, 200);

  showDamage("-5", window.innerWidth/2, 200);
  update();
}

/* شحن */
function charge() {
  energy++;
}

/* ضربة قوية */
function special() {
  if (energy >= 3) {
    enemyHP -= 20;
    energy -= 3;

    showDamage("-20 💥", window.innerWidth/2, 200);
    update();
  }
}

/* العدو يهاجم */
setInterval(() => {
  if (playerHP > 0 && enemyHP > 0) {
    playerHP -= 3;

    document.querySelector(".player").style.transform = "translateX(20px)";
    setTimeout(() => {
      document.querySelector(".player").style.transform = "translateX(0)";
    }, 200);

    showDamage("-3", window.innerWidth/2, 300);
    update();
  }
}, 1500);

update();
</script>

</body>
  </html>
