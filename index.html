<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لعبة الهامستر</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle, #111, #000);
    color: white;
    text-align: center;
}

.container {
    margin-top: 60px;
}

.balance {
    font-size: 28px;
}

.coins {
    font-size: 40px;
    margin: 10px 0;
}

button {
    padding: 15px 25px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(45deg, #00c853, #00e676);
    color: white;
    cursor: pointer;
    box-shadow: 0 0 15px #00e676;
}

button:active {
    transform: scale(0.95);
}

.plus {
    position: absolute;
    color: gold;
    font-size: 20px;
    animation: float 1s ease-out forwards;
}

@keyframes float {
    0% {opacity:1; transform: translateY(0);}
    100% {opacity:0; transform: translateY(-60px);}
}

.section {
    margin-top: 40px;
    padding: 20px;
    border-top: 1px solid #333;
}
</style>
</head>

<body>

<div class="container">
    <div class="balance">💰 رصيدك</div>
    <div id="coins" class="coins">0</div>

    <button onclick="clickCoin(event)">اضغط 🐹</button>
</div>

<div class="section">
    <h2>🛒 المتجر</h2>
    <button onclick="buy()">شراء مضاعف (50)</button>
</div>

<div class="section">
    <h2>👥 دعوة الأصدقاء</h2>
    <p>قريباً...</p>
</div>

<script>
let coins = 0;
let power = 1;

function clickCoin(e) {
    coins += power;
    document.getElementById("coins").innerText = coins;

    let plus = document.createElement("div");
    plus.innerText = "+" + power;
    plus.className = "plus";

    plus.style.left = e.clientX + "px";
    plus.style.top = e.clientY + "px";

    document.body.appendChild(plus);

    setTimeout(() => plus.remove(), 1000);
}

function buy() {
    if (coins >= 50) {
        coins -= 50;
        power++;
        alert("تم شراء مضاعف!");
    } else {
        alert("رصيد غير كافي");
    }
}
</script>

</body>
</html>
